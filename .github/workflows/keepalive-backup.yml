name: Supabase Keep-Alive y Backup

on:
  schedule:
    - cron: '0 8 */3 * *'  # cada 3 días a las 8am UTC
  workflow_dispatch:        # permite correrlo manualmente desde GitHub

permissions:
  contents: write

env:
  SUPABASE_URL: https://vdsrhoomfmseduyszrts.supabase.co
  ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkc3Job29tZm1zZWR1eXN6cnRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDc4NjksImV4cCI6MjA5NTA4Mzg2OX0.jNRF58COs5Qsg638P8ADgreTVTE-Ve6H-ZImqzkdzK4

jobs:
  keepalive-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (keep-alive)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/apartamentos?select=id&limit=1" \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY")
          echo "Supabase status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Supabase activo" || echo "⚠️ Status inesperado: $STATUS"

      - name: Checkout rama backups
        uses: actions/checkout@v4
        with:
          ref: backups
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Exportar tablas
        env:
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p "$DATE"
          for TABLE in apartamentos perfiles comunicados reservas gastos publicaciones; do
            curl -s "$SUPABASE_URL/rest/v1/$TABLE?select=*" \
              -H "apikey: $SERVICE_KEY" \
              -H "Authorization: Bearer $SERVICE_KEY" \
              -o "$DATE/$TABLE.json"
            echo "✅ $TABLE exportado"
          done
          # Retener solo los últimos 8 backups
          ls -dt */ 2>/dev/null | tail -n +9 | xargs rm -rf 2>/dev/null || true

      - name: Guardar backup en GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Backup $(date +%Y-%m-%d)"
          git push
